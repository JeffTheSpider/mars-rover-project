<!DOCTYPE html>
<html>
<head><title>Generate Rover PWA Icons</title></head>
<body style="background:#1e1e2e;color:#cdd6f4;font-family:system-ui;padding:20px;">
<h2>Rover PWA Icon Generator</h2>
<p>Open rover-icon.svg, render to canvas at 192px and 512px, download as PNG.</p>
<canvas id="c512" width="512" height="512" style="border:1px solid #45475a;margin:10px;"></canvas>
<canvas id="c192" width="192" height="192" style="border:1px solid #45475a;margin:10px;"></canvas>
<br>
<button id="gen" style="padding:10px 20px;background:#f38ba8;color:#1e1e2e;border:none;border-radius:8px;font-size:16px;cursor:pointer;">Generate & Download</button>
<p id="status"></p>
<script>
document.getElementById('gen').addEventListener('click', () => {
    const img = new Image();
    img.onload = () => {
        // 512px
        const c512 = document.getElementById('c512');
        const ctx512 = c512.getContext('2d');
        ctx512.drawImage(img, 0, 0, 512, 512);

        // 192px
        const c192 = document.getElementById('c192');
        const ctx192 = c192.getContext('2d');
        ctx192.drawImage(img, 0, 0, 192, 192);

        // Download 512
        c512.toBlob(blob => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'rover-512.png';
            a.click();
        });

        // Download 192
        setTimeout(() => {
            c192.toBlob(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'rover-192.png';
                a.click();
            });
        }, 500);

        document.getElementById('status').textContent = 'Icons downloaded! Move them to this folder.';
    };
    img.src = 'rover-icon.svg';
});
</script>
</body>
</html>
